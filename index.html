<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B6B">
<title>🐾 咖咖与夏夏专属管家</title>
<style>
/* Splash screen - instant render before main CSS/JS */
#splash{position:fixed;inset:0;z-index:9999;background:#FFF8F0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
@media(prefers-color-scheme:dark){#splash{background:#1A1A2E;color:#EAEAEA}}
#splash .sp-icon{font-size:64px;animation:sp-bounce 1s ease-in-out infinite}
#splash .sp-name{font-size:20px;font-weight:700;margin-top:12px;color:#FF6B6B}
#splash .sp-dots{margin-top:16px;display:flex;gap:6px}
#splash .sp-dot{width:8px;height:8px;border-radius:50%;background:#FF6B6B;animation:sp-pulse 1.2s ease-in-out infinite}
#splash .sp-dot:nth-child(2){animation-delay:.2s}
#splash .sp-dot:nth-child(3){animation-delay:.4s}
@keyframes sp-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes sp-pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
</style>
<style>
:root{--bg:#FFF8F0;--card:#fff;--pri:#FF6B6B;--pri-l:#FF8E8E;--pri-d:#E55A5A;--sec:#4ECDC4;--txt:#2D3436;--txt-l:#636E72;--txt-m:#B2BEC3;--bdr:#F0E6DE;--shd:0 2px 12px rgba(0,0,0,.08);--dng:#E74C3C;--wrn:#F39C12;--suc:#27AE60;--rad:16px;--rad-s:10px;--tab-h:64px}
@media(prefers-color-scheme:dark){:root{--bg:#1A1A2E;--card:#222244;--txt:#EAEAEA;--txt-l:#B0B0C0;--txt-m:#666680;--bdr:#333355;--shd:0 2px 12px rgba(0,0,0,.3)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(255,107,107,.3)}
.hdr h1{font-size:20px}.hdr small{font-size:12px;opacity:.85}
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--card);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--bdr);z-index:200;box-shadow:0 -2px 10px rgba(0,0,0,.05);padding-bottom:env(safe-area-inset-bottom,0)}
.tab-i{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 12px;border-radius:var(--rad-s);transition:.2s;user-select:none}
.tab-i:active{transform:scale(.92)}.tab-i .ic{font-size:22px}.tab-i .lb{font-size:10px;color:var(--txt-m);font-weight:500}
.tab-i.active .lb{color:var(--pri);font-weight:700}.tab-i.active{background:rgba(255,107,107,.08)}
.page{display:none;padding:16px;max-width:500px;margin:0 auto;animation:fi .3s}.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--rad);padding:16px;margin-bottom:14px;box-shadow:var(--shd);border:1px solid var(--bdr);transition:.15s}
.card:active{transform:scale(.985)}
.ct{font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--rad-s);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;user-select:none;font-family:inherit;color:var(--txt)}
.btn:active{transform:scale(.95)}.btn-p{background:var(--pri);color:#fff}.btn-s2{background:var(--sec);color:#fff}
.btn-o{background:transparent;color:var(--pri);border:1.5px solid var(--pri)}.btn-sm{padding:6px 12px;font-size:12px}
.btn-d{background:var(--dng);color:#fff}.btn-blk{width:100%}
.fg{margin-bottom:12px}.fl{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--txt-l)}
.fi,.fsel,.fta{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:var(--rad-s);font-size:14px;background:var(--card);color:var(--txt);font-family:inherit;transition:border-color .2s;-webkit-appearance:none}
.fi:focus,.fsel:focus,.fta:focus{outline:none;border-color:var(--pri)}.fta{resize:vertical;min-height:60px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-safe{background:#E8F5E9;color:var(--suc)}.b-warn{background:#FFF3E0;color:var(--wrn)}.b-toxic{background:#FFEBEE;color:var(--dng)}
.b-pri{background:rgba(255,107,107,.12);color:var(--pri)}.b-sec{background:rgba(78,205,196,.12);color:var(--sec)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fo .2s}
@keyframes fo{from{opacity:0}to{opacity:1}}
.modal-c{background:var(--card);border-radius:var(--rad) var(--rad) 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.modal-h h3{font-size:18px}
.modal-x{width:32px;height:32px;border:none;background:var(--bdr);border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt-l)}
.tg{display:flex;gap:6px;flex-wrap:wrap}
.tb{padding:6px 14px;border:1.5px solid var(--bdr);border-radius:20px;background:transparent;font-size:13px;cursor:pointer;color:var(--txt-l);transition:.15s;font-family:inherit}
.tb.active{background:var(--pri);color:#fff;border-color:var(--pri)}.tb:active{transform:scale(.95)}
.dog-card{background:linear-gradient(135deg,var(--card),rgba(255,107,107,.04));border-radius:var(--rad);padding:16px;margin-bottom:14px;box-shadow:var(--shd);border:1px solid var(--bdr)}
.dog-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dog-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pri-l),var(--sec));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.dog-av img{width:100%;height:100%;object-fit:cover}
.dog-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-i{text-align:center;padding:8px 4px;background:rgba(255,107,107,.05);border-radius:var(--rad-s)}
.stat-v{font-size:18px;font-weight:700;color:var(--pri)}.stat-l{font-size:10px;color:var(--txt-m);margin-top:2px}
.weather-w{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:var(--rad);padding:14px 16px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.weather-t{font-size:28px;font-weight:700}.weather-d{font-size:12px;opacity:.85}
.weather-alert{background:var(--wrn);color:#fff;padding:8px 12px;border-radius:var(--rad-s);font-size:12px;font-weight:600;margin-bottom:14px;text-align:center}
.timer-d{font-size:48px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--pri);margin:16px 0}
.timer-c{display:flex;gap:10px;justify-content:center}
.food-i{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--rad-s);margin-bottom:8px;background:var(--card);border:1px solid var(--bdr);cursor:pointer;transition:.15s}
.food-i:active{transform:scale(.98)}.food-ic{font-size:28px;flex-shrink:0}.food-inf{flex:1}
.food-n{font-weight:600;font-size:14px}.food-nt{font-size:11px;color:var(--txt-l);margin-top:2px}.food-fav{font-size:20px;cursor:pointer;background:none;border:none}
.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:12px 16px 12px 40px;border:1.5px solid var(--bdr);border-radius:24px;font-size:14px;background:var(--card);color:var(--txt);font-family:inherit}
.search-box input:focus{outline:none;border-color:var(--pri)}.search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}.cat-tabs::-webkit-scrollbar{display:none}
.hl-urgent{border-left:3px solid var(--dng)!important;background:rgba(231,76,60,.04)!important}
.empty-s{text-align:center;padding:40px 20px;color:var(--txt-m)}.empty-s p{font-size:14px}
.walk-i{padding:12px;border-radius:var(--rad-s);background:rgba(78,205,196,.06);margin-bottom:8px;border:1px solid var(--bdr)}
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stats-c{background:var(--card);border-radius:var(--rad-s);padding:12px;text-align:center;border:1px solid var(--bdr)}
.duty-c{background:linear-gradient(135deg,rgba(78,205,196,.1),rgba(255,107,107,.05));border:1.5px solid var(--sec);border-radius:var(--rad);padding:16px;text-align:center;margin-bottom:14px}
.duty-p{font-size:24px;font-weight:700;color:var(--sec)}
.pt{display:flex;gap:8px;margin-bottom:14px}
.pt-i{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:var(--rad-s);border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;font-size:14px;font-weight:600;transition:.15s;font-family:inherit;color:var(--txt)}
.pt-i.active{border-color:var(--pri);background:rgba(255,107,107,.08);color:var(--pri)}.pt-i:active{transform:scale(.97)}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.poop-t{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.poop-n{background:#E8F5E9;color:var(--suc)}.poop-s{background:#FFF3E0;color:var(--wrn)}.poop-a{background:#FFEBEE;color:var(--dng)}
.del-b{background:none;border:none;color:var(--txt-m);cursor:pointer;font-size:16px;padding:4px}.del-b:hover{color:var(--dng)}
.chart-cont{position:relative;width:100%;height:160px;margin-top:8px}.chart-cont canvas{width:100%!important;height:100%!important}
.fb{display:flex;justify-content:space-between;align-items:center}
.mt8{margin-top:8px}.mb8{margin-bottom:8px}.mb4{margin-bottom:4px}.tsm{font-size:12px}.tmut{color:var(--txt-m)}.tc{text-align:center}
.mini-chart{height:40px;margin-top:4px}
.food-detail{padding:12px;background:rgba(78,205,196,.06);border-radius:var(--rad-s);margin-top:8px;font-size:13px;color:var(--txt-l)}
.av-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.av-o{width:44px;height:44px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:.15s}
.av-o.selected{border-color:var(--pri);background:rgba(255,107,107,.1);transform:scale(1.1)}
.av-o:active{transform:scale(.95)}
.duty-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.duty-tbl th,.duty-tbl td{border:1px solid var(--bdr);padding:6px 4px;text-align:center;vertical-align:middle}
.duty-tbl th{background:rgba(255,107,107,.08);font-weight:600;font-size:11px}
.duty-tbl td{cursor:pointer;min-height:32px;transition:background .15s}
.duty-tbl td:hover{background:rgba(78,205,196,.1)}
.duty-tbl .duty-cell-tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;background:rgba(78,205,196,.15);color:var(--sec);margin:1px;font-weight:600}
.stat-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-nav-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt-l);padding:4px 8px;border-radius:var(--rad-s)}
.stat-nav-btn:active{background:rgba(0,0,0,.05)}
.stat-period{display:flex;gap:4px}
.stat-period .tb{padding:4px 10px;font-size:11px}
.stat-card{background:var(--card);border-radius:var(--rad-s);padding:14px;border:1px solid var(--bdr);margin-bottom:10px}
.stat-card-title{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04)}
.stat-row:last-child{border-bottom:none}
.stat-total{border-top:1.5px solid var(--bdr);margin-top:6px;padding-top:6px;font-weight:700;font-size:13px;display:flex;justify-content:space-between}
.pee-poop-summary{display:flex;gap:12px;justify-content:center;margin-bottom:8px;font-size:13px;color:var(--txt-l)}
.pee-poop-summary span{font-weight:600}
</style>
</head>

<script>
// Fallback: force-remove splash after 3s no matter what (even if JS errors below)
setTimeout(function(){var s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(function(){s.remove()},400)}},3000);

// ==================== FIREBASE ASYNC LOADER ====================
var _firebaseReady = false;
var _offlineMode = false;

function loadScript(src, timeout) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    var tid = null;
    s.onload = function() { if (tid) clearTimeout(tid); resolve(); };
    s.onerror = function() { if (tid) clearTimeout(tid); reject(new Error('load error: ' + src)); };
    document.head.appendChild(s);
    if (timeout) tid = setTimeout(function() { reject(new Error('timeout: ' + src)); }, timeout);
  });
}

function _doInitFirebase() {
  return loadScript('firebase-app-compat.js', 15000)
    .then(function() { return loadScript('firebase-database-compat.js', 15000); })
    .then(function() { return loadScript('firebase-auth-compat.js', 15000); })
    .then(function() {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      return firebase.auth().signInAnonymously();
    })
    .then(function() {
      _firebaseReady = true;
      _offlineMode = false;
      window.db = firebase.database();
      setupFirebaseSync();
      // Connection status
      db.ref('.info/connected').on('value', function(snap) {
        var dot = document.getElementById('sync-dot');
        if (dot) dot.style.background = snap.val() ? '#27AE60' : '#E74C3C';
        if (snap.val()) flushPendingSync();
      });
    });
}

var _fbRetryCount = 0;
function retryFirebase() {
  if (_firebaseReady) return; // already connected
  var dot = document.getElementById('sync-dot');
  if (dot) { dot.style.background = '#F39C12'; dot.title = '正在重连...'; }
  _fbRetryCount = 0;
  _offlineMode = false;
  initFirebase();
}
function initFirebase() {
  return _doInitFirebase().catch(function(err) {
    _fbRetryCount++;
    console.warn('Firebase init attempt', _fbRetryCount, 'failed:', err);
    if (_fbRetryCount < 3) {
      // Retry after increasing delay
      return new Promise(function(resolve) {
        setTimeout(resolve, _fbRetryCount * 3000);
      }).then(function() { return _doInitFirebase(); });
    }
    console.warn('Firebase unavailable after retries, offline mode');
    _offlineMode = true;
    var dot = document.getElementById('sync-dot');
    if (dot) { dot.style.background = '#ccc'; dot.title = '离线模式 - 下拉刷新重试'; }
  });
}

function flushPendingSync() {
  if (!_firebaseReady || !window.db) return;
  var pending = PendingSync.get();
  var keys = Object.keys(pending);
  if (keys.length === 0) return;
  console.log('[Sync] Flushing', keys.length, 'pending writes');
  keys.forEach(function(k) {
    db.ref('data/' + k).set(pending[k]).then(function() {
      PendingSync.remove(k);
    }).catch(function(err) {
      console.warn('[Sync] Failed to flush', k, err);
    });
  });
}

function setupFirebaseSync() {
  // Flush any offline writes first — local changes take priority
  flushPendingSync();

  // Listen for realtime changes
  DATA_KEYS.forEach(function(key) {
    db.ref('data/' + key).on('value', function(snapshot) {
      var val = snapshot.val();
      // Skip server update if we have pending local changes for this key
      if (PendingSync.has(key)) {
        console.log('[Sync] Skipping server update for', key, '- pending local write exists');
        return;
      }
      if (val !== null && val !== undefined) {
        LS._syncing = true;
        localStorage.setItem('dogbutler_' + key, JSON.stringify(val));
        _fbUpdateVar(key, val);
        LS._syncing = false;
        _fbRefreshPage();
      }
    });
  });

  // First-time migration: push local data to Firebase if cloud is empty
  db.ref('data').once('value', function(snapshot) {
    if (!snapshot.exists()) {
      var localData = {};
      DATA_KEYS.forEach(function(key) {
        var val = LS.get(key, null);
        if (val !== null) localData[key] = val;
      });
      if (Object.keys(localData).length > 0) {
        db.ref('data').set(localData).catch(function(){});
      }
    }
  });
}

  _syncing: false,
  get(k, d) { try { return JSON.parse(localStorage.getItem('dogbutler_'+k)) || d; } catch { return d; } },
  set(k, v) {
    localStorage.setItem('dogbutler_'+k, JSON.stringify(v));
    if (!this._syncing && DATA_KEYS.includes(k)) {
      if (_firebaseReady && window.db) {
        db.ref('data/' + k).set(v).catch(function(){});
        PendingSync.remove(k);

      }
    }
  }
};

// Pending sync queue — stores writes that failed to reach Firebase
var PendingSync = {
  _key: 'dogbutler_pendingSync',
  get: function() { try { return JSON.parse(localStorage.getItem(this._key)) || {}; } catch(e) { return {}; } },
  add: function(k, v) { var q = this.get(); q[k] = v; localStorage.setItem(this._key, JSON.stringify(q)); },
  remove: function(k) { var q = this.get(); delete q[k]; localStorage.setItem(this._key, JSON.stringify(q)); },
  clear: function() { localStorage.removeItem(this._key); },
  has: function(k) { return this.get().hasOwnProperty(k); },
  keys: function() { return Object.keys(this.get()); }
};

var _appReady = false;

// Re-render whichever page is currently active
function _fbRefreshPage() {
  if (!_appReady) return;
  var ap = document.querySelector('.page.active');
  if (!ap) return;
  var id = ap.id;
  if (id === 'pg-dash') renderDashboard();
  else if (id === 'pg-health') renderHealth();
  else if (id === 'pg-food') renderFoodPage();

}

// ==================== WEATHER ====================
async function fetchWeather() {
  try {
    const r = await fetch('https://wttr.in/?format=j1');
    const d = await r.json();
    const cur = d.current_condition[0];
    weatherData = {
      temp: cur.temp_C,
      feels: cur.FeelsLikeC,
      desc: cur.lang_zh && cur.lang_zh[0] ? cur.lang_zh[0].value : cur.weatherDesc[0].value,
      humidity: cur.humidity,
      icon: getWeatherIcon(cur.weatherCode)
    };
    renderWeather();
  } catch(e) {
    weatherData = null;
  }
}

function getWeatherIcon(code) {
  const c = parseInt(code);
  if (c === 113) return '☀️';
  if (c === 116) return '⛅';
  if ([119,122].includes(c)) return '☁️';
  if ([176,263,266,293,296,299,302,305,308,311,314,317,353,356,359].includes(c)) return '🌧️';
  if ([200,386,389,392,395].includes(c)) return '⛈️';
  if ([227,230,323,326,329,332,335,338,368,371,374,377].includes(c)) return '❄️';
  if ([143,248,260].includes(c)) return '🌫️';
  return '🌤️';
}

function renderWeather() {
  if (!weatherData) return;
  const alerts = [];
  if (parseInt(weatherData.temp) >= 35) alerts.push('🔥 高温警告！路面可能烫伤狗爪，建议清晨或傍晚遛狗');
  if (parseInt(weatherData.temp) >= 30) alerts.push('☀️ 气温较高，注意防暑，多带水');
  if (weatherData.desc.includes('雨') || weatherData.desc.includes('暴')) alerts.push('🌧️ 有雨，建议缩短遛狗时间或穿雨衣');
  if (parseInt(weatherData.temp) <= 0) alerts.push('🥶 气温极低，注意保暖，小型犬建议穿衣');

  const whtml = `<div class="weather-w"><div><div class="weather-t">${weatherData.icon} ${weatherData.temp}°C</div><div class="weather-d">体感 ${weatherData.feels}°C · ${weatherData.desc} · 湿度${weatherData.humidity}%</div></div></div>`;
  const ahtml = alerts.map(a => `<div class="weather-alert">${a}</div>`).join('');

  document.getElementById('weather-box').innerHTML = whtml + ahtml;
  document.getElementById('walk-weather').innerHTML = whtml + ahtml;
}

function renderAlerts() {
  const alerts = [];
  const today = new Date();
  vaccines.forEach(v => {
    const vType = VACC_TYPES.find(t => t.name === v.type);
    if (!vType) return;
    const nextDate = new Date(v.date);
    nextDate.setDate(nextDate.getDate() + vType.intervalDays);
    const diff = Math.ceil((nextDate - today) / 86400000);
    const dogName = dogs.find(d => d.id === v.dogId)?.name || '?';
    if (diff <= 3 && diff >= 0) {
      alerts.push({ urgent: true, text: `🚨 ${dogName} 的${v.type}将在 ${diff === 0 ? '今天' : diff + '天后'} 到期！` });
    } else if (diff < 0) {
      alerts.push({ urgent: true, text: `⚠️ ${dogName} 的${v.type}已过期 ${Math.abs(diff)} 天！` });
    } else if (diff <= 7) {
      alerts.push({ urgent: false, text: `📅 ${dogName} 的${v.type}将在 ${diff} 天后到期` });
    }
  });

  // Duty deviation alerts
  const dutySchedule = LS.get('dutySchedule', null);
  if (dutySchedule && dutySchedule.schedule) {
    const now = new Date();
    const isAm = now.getHours() < 12;
    const period = isAm ? 'am' : 'pm';
    const periodLabel = isAm ? '上午' : '下午';
    const scheduled = getDutyForDatePeriod(dutySchedule, now, period);
    if (scheduled.length > 0) {
      const todayLogs = walkLogs.filter(w => w.date === todayStr());
      // Filter logs for current period
      const periodLogs = todayLogs.filter(w => {
        const h = parseInt((w.startTime || '00:00').split(':')[0]);
        return isAm ? h < 12 : h >= 12;
      });
      const actualWalkers = [...new Set(periodLogs.map(w => w.walker))];
      const scheduledStr = scheduled.join('、');
      if (periodLogs.length === 0) {
        alerts.push({ urgent: true, text: `⏰ 今日${periodLabel}轮值：${scheduledStr}，还未遯狗` });
      } else {
        const mismatch = actualWalkers.some(w => !scheduled.includes(w)) || scheduled.some(s => !actualWalkers.includes(s));
        if (mismatch) {
          alerts.push({ urgent: false, text: `⚠️ 今日${periodLabel}轮值：${scheduledStr}，实际遯狗：${actualWalkers.join('、')}` });
        }
      }
    }
  }

  if (alerts.length === 0) {
    document.getElementById('alert-list').innerHTML = '<div class="empty-s"><div style="font-size:48px;margin-bottom:8px">😊</div><p>暂无提醒，一切安好！</p></div>';
  } else {
    document.getElementById('alert-list').innerHTML = alerts.map(a =>
      `<div class="${a.urgent ? 'hl-urgent' : ''}" style="padding:8px 12px;border-radius:var(--rad-s);margin-bottom:6px;font-size:13px">${a.text}</div>`
    ).join('');
  }
}

function getAge(birthday) {
  const bd = new Date(birthday);
  const today = new Date();
  let years = today.getFullYear() - bd.getFullYear();
  let months = today.getMonth() - bd.getMonth();
  if (months < 0) { years--; months += 12; }
  if (years > 0) return years + '岁' + (months > 0 ? months + '月' : '');
  return months + '个月';
}

function getNextVaccine(dogId) {
  const today = new Date();
  let nearest = null;
  vaccines.filter(v => v.dogId === dogId).forEach(v => {
    const vType = VACC_TYPES.find(t => t.name === v.type);
    if (!vType) return;
    const nextDate = new Date(v.date);
    nextDate.setDate(nextDate.getDate() + vType.intervalDays);
    const diff = Math.ceil((nextDate - today) / 86400000);
    if (!nearest || diff < nearest.days) {
      nearest = { type: v.type.replace(/\(.*\)/, ''), days: diff, date: nextDate };
    }
  });
  return nearest;
}

function getTodayWalkCount(dogId) {
  const dog = dogs.find(d => d.id === dogId);
  if (!dog) return 0;
  return walkLogs.filter(w => {
    if (w.date !== todayStr()) return false;
    const dogNames = (w.dogName || '').split(',');
    return dogNames.includes(dog.name) || dogNames.includes('一起');
  }).length;
}

function getLastWeight(dogId) {
  const ws = weights.filter(w => w.dogId === dogId).sort((a,b) => new Date(b.date) - new Date(a.date));
  return ws[0] || null;
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function drawMiniChart(canvas, data) {
  if (!data.length) return;
  const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
  const vals = sorted.map(d => parseFloat(d.value));
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = 80;
  ctx.clearRect(0, 0, w, h);
  if (vals.length < 2) return;
  const min = Math.min(...vals) * 0.95;
  const max = Math.max(...vals) * 1.05;
  const range = max - min || 1;
  const padX = 10, padY = 8;
  const stepX = (w - padX * 2) / (vals.length - 1);

  ctx.beginPath();
  ctx.strokeStyle = '#FF6B6B';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  vals.forEach((v, i) => {
    const x = padX + i * stepX;
    const y = padY + (1 - (v - min) / range) * (h - padY * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ==================== WEIGHT ====================
function renderWeightChart() {
  const dog = dogs[currentDog];
  const ws = weights.filter(w => w.dogId === dog.id).sort((a,b) => new Date(a.date) - new Date(b.date));
  const canvas = document.getElementById('wt-chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 160 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '160px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, 160);

  if (ws.length === 0) {
    ctx.fillStyle = '#B2BEC3';
    ctx.font = '14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('暂无体重数据', rect.width / 2, 80);
    document.getElementById('wt-recs').innerHTML = '';
    return;
  }

  const vals = ws.map(w => parseFloat(w.value));
  const min = Math.min(...vals) * 0.9;
  const max = Math.max(...vals) * 1.1;
  const range = max - min || 1;
  const padL = 40, padR = 20, padT = 20, padB = 30;
  const cw = rect.width - padL - padR;
  const ch = 160 - padT - padB;

  // Grid
  ctx.strokeStyle = '#F0E6DE';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(rect.width - padR, y);
    ctx.stroke();
    ctx.fillStyle = '#B2BEC3';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText((max - (range / 4) * i).toFixed(1), padL - 4, y + 3);
  }

  // Line
  const stepX = ws.length > 1 ? cw / (ws.length - 1) : 0;
  ctx.beginPath();
  ctx.strokeStyle = '#FF6B6B';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  vals.forEach((v, i) => {
    const x = padL + i * stepX;
    const y = padT + (1 - (v - min) / range) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill area
  ctx.lineTo(padL + (vals.length - 1) * stepX, padT + ch);
  ctx.lineTo(padL, padT + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,107,107,0.1)';
  ctx.fill();

  // Dots
  vals.forEach((v, i) => {
    const x = padL + i * stepX;
    const y = padT + (1 - (v - min) / range) * ch;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#FF6B6B';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // X labels
  ctx.fillStyle = '#B2BEC3';
  ctx.font = '9px system-ui';
  ctx.textAlign = 'center';
  ws.forEach((w, i) => {
    if (ws.length <= 7 || i % Math.ceil(ws.length / 7) === 0) {
      const x = padL + i * stepX;
      ctx.fillText(w.date.slice(5), x, 160 - 6);
    }
  });

  // Weight records list
  const recent = [...ws].reverse().slice(0, 5);
  document.getElementById('wt-recs').innerHTML = recent.map(w =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px">
      <span>${w.date}</span><span style="font-weight:600">${w.value} kg</span>
      <button class="del-b" onclick="deleteWeight('${w.id}')">🗑️</button>
    </div>`
  ).join('');
}

let foodCategory = '全部';
let expandedFood = null;

function renderFoodPage() {
  // Danger foods
  const dangers = FOODS.filter(f => f.safety === 'toxic');
  document.getElementById('danger-list').innerHTML = dangers.slice(0, 8).map(f =>
    `<span class="badge b-toxic" style="margin:2px">${f.icon} ${f.name}</span>`
  ).join('');

  // Category tabs
  const cats = ['全部', '⭐收藏', '水果', '蔬菜', '肉类', '零食', '人类食品'];
  document.getElementById('food-cats').innerHTML = cats.map(c =>
    `<button class="tb ${foodCategory === c ? 'active' : ''}" onclick="foodCategory='${c}';filterFoods()">${c}</button>`
  ).join('');

  filterFoods();
}

function filterFoods() {
  const q = (document.getElementById('food-search')?.value || '').toLowerCase();
  let list = FOODS;

  if (foodCategory === '⭐收藏') {
    list = list.filter(f => favFoods.includes(f.name));
  } else if (foodCategory !== '全部') {
    list = list.filter(f => f.cat === foodCategory);
  }
  if (q) list = list.filter(f => f.name.toLowerCase().includes(q) || f.cat.includes(q));

  // Sort: toxic first
  list.sort((a, b) => {
    const order = { toxic: 0, caution: 1, safe: 2 };
    return order[a.safety] - order[b.safety];
  });

  if (list.length === 0) {
    document.getElementById('food-list').innerHTML = '<div class="empty-s"><div style="font-size:48px;margin-bottom:8px">🔍</div><p>没有找到相关食物</p></div>';
    return;
  }

  document.getElementById('food-list').innerHTML = list.map(f => {
    const safetyMap = { safe: { badge: 'b-safe', label: '✅ 安全', icon: '✅' }, caution: { badge: 'b-warn', label: '⚠️ 少量', icon: '⚠️' }, toxic: { badge: 'b-toxic', label: '☠️ 有毒', icon: '☠️' } };
    const s = safetyMap[f.safety];
    const isFav = favFoods.includes(f.name);
    const isExpanded = expandedFood === f.name;
    return `<div class="food-i" onclick="toggleFoodDetail('${f.name}')">
      <div class="food-ic">${f.icon}</div>
      <div class="food-inf">
        <div class="food-n">${f.name} <span class="badge ${s.badge}">${s.label}</span></div>
        <div class="food-nt">${f.cat}</div>
        ${isExpanded ? `<div class="food-detail">
          <div>📝 ${f.note}</div>
          ${f.dose ? `<div style="margin-top:4px">📏 建议用量: ${f.dose}</div>` : ''}
        </div>` : ''}
      </div>
      <button class="food-fav" onclick="event.stopPropagation();toggleFav('${f.name}')">${isFav ? '⭐' : '☆'}</button>
    </div>`;
  }).join('');
}

function toggleFoodDetail(name) {
  expandedFood = expandedFood === name ? null : name;
  filterFoods();
}

function toggleFav(name) {
  if (favFoods.includes(name)) favFoods = favFoods.filter(f => f !== name);
  else favFoods.push(name);
  save();
  filterFoods();
}

// ==================== WALK MODULE ====================
function renderWalk() {
  renderWeather();
  renderWalkToggles();
  renderDuty();
  renderWalkStats();
  renderWalkLogs();
  // Restore timer if running
  const saved = LS.get('timerState', null);
  if (saved && saved.running) {
    timerRunning = true;
    timerStart = saved.start;
    currentWalkWhos = Array.isArray(saved.who) ? saved.who : (saved.who ? [saved.who] : []);
    currentWalkDogs = Array.isArray(saved.dog) ? saved.dog : (saved.dog ? [saved.dog] : []);
    currentPoops = saved.poops || [];
    document.getElementById('btn-start').textContent = '⏹️ 结束遛狗';
    document.getElementById('btn-start').classList.remove('btn-p');
    document.getElementById('btn-start').classList.add('btn-d');
    document.getElementById('poop-card').style.display = '';
    renderPoopCard();
    startTimerTick();
    renderPoops();
    // Highlight active toggles
    setTimeout(() => {
      document.querySelectorAll('#walk-who .tb').forEach(b => b.classList.toggle('active', currentWalkWhos.includes(b.textContent)));
      document.querySelectorAll('#walk-dog .tb').forEach(b => b.classList.toggle('active', currentWalkDogs.includes(b.textContent)));
    }, 50);
  }
}

function renderWalkToggles() {
  // Who's walking
  const members = dutyMembers;
  document.getElementById('walk-who').innerHTML = members.map(m =>
    `<button class="tb ${currentWalkWhos.includes(m) ? 'active' : ''}" onclick="selectWalkWho(this,'${m}')">${m}</button>`
  ).join('');

  // Which dog
  const dogOpts = [...dogs.map(d => d.name || '未命名'), '一起'];
  document.getElementById('walk-dog').innerHTML = dogOpts.map(d =>
    `<button class="tb ${currentWalkDogs.includes(d) ? 'active' : ''}" onclick="selectWalkDog(this,'${d}')">${d}</button>`
  ).join('');
}

function selectWalkWho(el, name) {
  el.classList.toggle('active');
  if (el.classList.contains('active')) {
    if (!currentWalkWhos.includes(name)) currentWalkWhos.push(name);
  } else {
    currentWalkWhos = currentWalkWhos.filter(n => n !== name);
  }
}

function selectWalkDog(el, name) {
  el.classList.toggle('active');
  if (el.classList.contains('active')) {
    if (!currentWalkDogs.includes(name)) currentWalkDogs.push(name);
  } else {
    currentWalkDogs = currentWalkDogs.filter(n => n !== name);
  }
}

function toggleTimer() {
  if (!timerRunning) {
    if (currentWalkWhos.length === 0) { alert('请选择谁来遛'); return; }
    if (currentWalkDogs.length === 0) { alert('请选择遛哪只狗'); return; }
    timerRunning = true;
    timerStart = Date.now();
    currentPoops = [];
    document.getElementById('btn-start').textContent = '⏹️ 结束遛狗';
    document.getElementById('btn-start').classList.remove('btn-p');
    document.getElementById('btn-start').classList.add('btn-d');
    document.getElementById('poop-card').style.display = '';
    renderPoopCard();
    LS.set('timerState', { running: true, start: timerStart, who: currentWalkWhos, dog: currentWalkDogs, poops: [] });
    startTimerTick();
  } else {
    const duration = Math.floor((Date.now() - timerStart) / 1000);
    timerRunning = false;
    clearInterval(timerInterval);
    walkLogs.push({
      id: Date.now().toString(),
      date: todayStr(),
      walker: currentWalkWhos.join(','),
      dogName: currentWalkDogs.join(','),
      duration: duration,
      startTime: new Date(timerStart).toTimeString().slice(0, 5),
      endTime: new Date().toTimeString().slice(0, 5)
    });
    // Save poop logs
    currentPoops.forEach(p => {
      poopLogs.push({ ...p, walkId: walkLogs[walkLogs.length - 1].id });
    });
    save();
    document.getElementById('timer').textContent = '00:00:00';
    document.getElementById('btn-start').textContent = '🐾 开始遛狗';
    document.getElementById('btn-start').classList.add('btn-p');
    document.getElementById('btn-start').classList.remove('btn-d');
    document.getElementById('poop-card').style.display = 'none';
    currentPoops = [];
    LS.set('timerState', null);
    renderWalk();
  }
}

function startTimerTick() {
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('timer').textContent = formatDuration(elapsed);
  }, 1000);
}

function formatDuration(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
}

function getPoopDogList() {

  const saved = LS.get('timerState', {});
  saved.poops = currentPoops;
  LS.set('timerState', saved);

function deletePoopRecord(idx) {
  if (!confirm('确定要删除这条记录吗？')) return;
  currentPoops.splice(idx, 1);
  const saved = LS.get('timerState', {});
  saved.poops = currentPoops;
  LS.set('timerState', saved);
  renderPoops();

function renderPoops() {
  // === Summary: today's total per-dog, from poopLogs + currentPoops ===
  const summaryEl = document.getElementById('pee-poop-summary');
  if (summaryEl) {
    const today = todayStr();
    // Saved records from today
    const todaySaved = poopLogs.filter(p => {
      const wl = walkLogs.find(w => w.id === p.walkId);
      return wl && wl.date === today;
    });
    // Combine with current session records
    const allToday = [...todaySaved, ...currentPoops];
    if (allToday.length > 0) {
      const poopDogs = getPoopDogList();
      // Collect all unique dog names from allToday
      const allDogNames = [...new Set(allToday.map(p => p.dog).filter(Boolean))];
      // If no dog field, use poopDogs
      const displayDogs = allDogNames.length > 0 ? allDogNames : poopDogs;
      let summaryHtml = '';
      displayDogs.forEach(dogName => {
        const dogRecs = allToday.filter(p => p.dog === dogName);
        const pee = dogRecs.filter(p => p.type === 'pee').length;
        const poop = dogRecs.filter(p => p.type === 'poop' || (!p.type && p.status)).length;
        if (pee > 0 || poop > 0) {
          const parts = [];
          if (pee > 0) parts.push(`💧${pee}`);
          if (poop > 0) parts.push(`💩${poop}`);
          summaryHtml += `<span>${dogName}: ${parts.join(' ')}</span>`;
        }
      });
      summaryEl.innerHTML = summaryHtml || '';
    } else {
      summaryEl.innerHTML = '';
    }
  }
  // === Current session records list with delete buttons ===
  if (!currentPoops.length) {
    document.getElementById('poop-recs').innerHTML = '<div class="tsm tmut tc">暂无记录</div>';
    return;
  }
  const clsMap = { '正常': 'poop-n', '偏软': 'poop-s', '异常': 'poop-a' };
  const poopDogs = getPoopDogList();

  function renderRecordItem(p, originalIdx) {
    const delBtn = `<button class="del-b" onclick="deletePoopRecord(${originalIdx})" style="margin-left:6px;font-size:12px">🗑️</button>`;
    if (p.type === 'pee') {
      return `<div style="margin-bottom:4px;display:flex;align-items:center"><span class="tsm tmut">${p.time}</span> <span class="poop-t" style="background:#E3F2FD;color:#1976D2">💧 小便</span>${delBtn}</div>`;
    }
    return `<div style="margin-bottom:4px;display:flex;align-items:center"><span class="tsm tmut">${p.time}</span> <span class="poop-t ${clsMap[p.status]}">💩 ${p.status}</span>${delBtn}</div>`;
  }

  if (poopDogs.length <= 1) {
    // Build with original indices for delete
    const indexed = currentPoops.map((p, i) => ({ p, i })).reverse();
    document.getElementById('poop-recs').innerHTML = indexed.map(({ p, i }) => renderRecordItem(p, i)).join('');
  } else {
    let html = '';
    poopDogs.forEach(dogName => {
      const indexed = currentPoops.map((p, i) => ({ p, i })).filter(({ p }) => p.dog === dogName).reverse();
      html += `<div style="margin-bottom:8px"><div class="fl" style="font-weight:600;margin-bottom:2px">${dogName}</div>`;
      if (indexed.length === 0) {
        html += '<div class="tsm tmut">暂无记录</div>';
      } else {
        html += indexed.map(({ p, i }) => renderRecordItem(p, i)).join('');
      }
      html += '</div>';
    });
    document.getElementById('poop-recs').innerHTML = html;
  }
}

// ==================== DUTY ====================
function getDutySchedule() {
  return LS.get('dutySchedule', { members: dutyMembers, schedule: {} });
}

function getDutyForDatePeriod(ds, date, period) {
  // Try date-based key first, then fallback to weekday-based key
  const dateStr = date.toISOString().slice(0, 10);
  const dateKey = dateStr + '_' + period;
  if (ds.schedule[dateKey] && ds.schedule[dateKey].length > 0) return ds.schedule[dateKey];
  // Fallback to weekday key
  const dow = date.getDay() === 0 ? 7 : date.getDay();
  const weekdayKey = dow + '_' + period;
  return ds.schedule[weekdayKey] || [];
}

function getTodayDutyInfo() {
  const ds = getDutySchedule();
  const now = new Date();
  const am = getDutyForDatePeriod(ds, now, 'am').join('、') || '未排班';
  const pm = getDutyForDatePeriod(ds, now, 'pm').join('、') || '未排班';
  return { am, pm };
}

function getCurrentDuty() {
  const ds = getDutySchedule();
  const now = new Date();
  const period = now.getHours() < 12 ? 'am' : 'pm';
  return getDutyForDatePeriod(ds, now, period).join('、') || '未排班';
}

function renderDuty() {
  const info = getTodayDutyInfo();
  const now = new Date();
  const isAm = now.getHours() < 12;
  document.getElementById('duty-today').innerHTML = `<div>上午：${info.am}</div><div>下午：${info.pm}</div><div class="tsm tmut" style="margin-top:4px">当前时段: ${isAm ? '上午' : '下午'} → ${isAm ? info.am : info.pm}</div>`;
}

let dutyWeekOffset = 0;

function getDutyWeekDates(offset) {
  const now = new Date();
  const currentDay = now.getDay() === 0 ? 7 : now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - currentDay + 1 + offset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function showDutyModal() {
  const ds = getDutySchedule();
  const members = ds.members || dutyMembers;
  const dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
  const weekDates = getDutyWeekDates(dutyWeekOffset);
  const weekStart = weekDates[0];
  const weekEnd = weekDates[6];
  const weekLabel = `${weekStart.getMonth()+1}.${weekStart.getDate()}-${weekEnd.getMonth()+1}.${weekEnd.getDate()}`;

  let weekNav = `<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px">
    <button class="btn btn-sm btn-o" onclick="dutyWeekOffset--;showDutyModal()">◀ 上一周</button>
    <span class="tsm" style="font-weight:600;min-width:100px;text-align:center">${dutyWeekOffset === 0 ? '本周' : ''} (${weekLabel})</span>
    <button class="btn btn-sm btn-o" onclick="dutyWeekOffset++;showDutyModal()">下一周 ▶</button>
  </div>`;

  let tableHtml = '<table class="duty-tbl"><thead><tr><th></th>';
  dayNames.forEach((d, i) => { tableHtml += `<th>${d}<br><span style="font-weight:400;font-size:10px;color:var(--txt-m)">${weekDates[i].getMonth()+1}/${weekDates[i].getDate()}</span></th>`; });
  tableHtml += '</tr></thead><tbody>';
  ['am','pm'].forEach(period => {
    const label = period === 'am' ? '上午' : '下午';
    tableHtml += `<tr><th>${label}</th>`;
    for (let d = 0; d < 7; d++) {
      const dateStr = weekDates[d].toISOString().slice(0, 10);
      const key = dateStr + '_' + period;
      // Resolve: try date key, fallback to weekday key
      let assigned = ds.schedule[key] || [];
      if (assigned.length === 0) {
        const dow = weekDates[d].getDay() === 0 ? 7 : weekDates[d].getDay();
        assigned = ds.schedule[dow + '_' + period] || [];
      }
      const tags = assigned.map(a => `<span class="duty-cell-tag">${a}</span>`).join('');
      tableHtml += `<td onclick="editDutyCell('${key}')" id="duty-cell-${key}">${tags || '<span class="tsm tmut">+</span>'}</td>`;
    }
    tableHtml += '</tr>';
  });
  tableHtml += '</tbody></table>';

  openModal('👨‍👩‍👧‍👦 每天谁来遛 - 排班设置', `
    <div class="fg"><label class="fl">轮值成员（逗号分隔）</label>
      <input class="fi" id="duty-input" value="${members.join(', ')}" placeholder="如：爸爸, 妈妈, 姐姐" onchange="updateDutyMembers()">
    </div>
    ${weekNav}
    <div class="tsm tmut mb8">点击表格单元格选择该时段的轮值人</div>
    ${tableHtml}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-o" style="flex:1" onclick="copyLastWeekDuty()">📋 复制上周排班</button>
      <button class="btn btn-p" style="flex:1" onclick="saveDutySchedule()">保存排班</button>
    </div>
  `);
}

function copyLastWeekDuty() {
  const ds = getDutySchedule();
  const lastWeekDates = getDutyWeekDates(dutyWeekOffset - 1);
  const thisWeekDates = getDutyWeekDates(dutyWeekOffset);
  for (let d = 0; d < 7; d++) {
    const lastDateStr = lastWeekDates[d].toISOString().slice(0, 10);
    const thisDateStr = thisWeekDates[d].toISOString().slice(0, 10);
    ['am', 'pm'].forEach(period => {
      let src = ds.schedule[lastDateStr + '_' + period] || [];
      if (src.length === 0) {
        const dow = lastWeekDates[d].getDay() === 0 ? 7 : lastWeekDates[d].getDay();
        src = ds.schedule[dow + '_' + period] || [];
      }
      if (src.length > 0) {
        ds.schedule[thisDateStr + '_' + period] = [...src];
      }
    });
  }
  LS.set('dutySchedule', ds);
  showDutyModal();
}

function updateDutyMembers() {
  const val = document.getElementById('duty-input').value;
  const newMembers = val.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  const ds = getDutySchedule();
  ds.members = newMembers;
  // Clean up schedule entries that reference removed members
  Object.keys(ds.schedule).forEach(key => {
    ds.schedule[key] = ds.schedule[key].filter(m => newMembers.includes(m));
  });
  LS.set('dutySchedule', ds);
  // Re-render modal
  showDutyModal();
}

function editDutyCell(cellKey) {
  const ds = getDutySchedule();
  const members = ds.members || dutyMembers;
  // Resolve assigned: try exact key, fallback for date key to weekday key
  let assigned = ds.schedule[cellKey] || [];
  if (assigned.length === 0) {
    // If date-based key (YYYY-MM-DD_period), try fallback to weekday key
    const parts = cellKey.split('_');
    if (parts[0].includes('-')) {
      const d = new Date(parts[0]);
      const dow = d.getDay() === 0 ? 7 : d.getDay();
      assigned = ds.schedule[dow + '_' + parts[1]] || [];
    }
  }
  const parts = cellKey.split('_');
  const periodLabel = parts[parts.length - 1] === 'am' ? '上午' : '下午';
  let label;
  if (parts[0].includes('-')) {
    const d = new Date(parts[0]);
    const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
    label = dayNames[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + periodLabel;
  } else {
    const dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
    label = dayNames[parseInt(parts[0]) - 1] + ' ' + periodLabel;
  }

  const checkboxes = members.map(m => {
    const checked = assigned.includes(m) ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--rad-s);cursor:pointer;border:1px solid var(--bdr);margin-bottom:4px">
      <input type="checkbox" value="${m}" ${checked} style="width:18px;height:18px"> <span style="font-size:14px">${m}</span></label>`;
  }).join('');

  // Use a sub-modal approach: replace modal content
  const modalC = document.querySelector('.modal-c');
  if (modalC) {
    modalC.innerHTML = `
      <div class="modal-h"><h3>选择值班人 - ${label}</h3><button class="modal-x" onclick="showDutyModal()">←</button></div>
      <div id="duty-cell-checks">${checkboxes}</div>
      <button class="btn btn-p btn-blk mt8" onclick="saveDutyCell('${cellKey}')">确定</button>
    `;
  }
}

function saveDutyCell(cellKey) {
  const checks = document.querySelectorAll('#duty-cell-checks input[type=checkbox]');
  const selected = [];
  checks.forEach(c => { if (c.checked) selected.push(c.value); });
  const ds = getDutySchedule();
  ds.schedule[cellKey] = selected;
  LS.set('dutySchedule', ds);
  showDutyModal();
}

function saveDutySchedule() {
  if (!confirm('确定要保存排班设置吗？')) return;
  const val = document.getElementById('duty-input').value;
  const newMembers = val.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  dutyMembers = newMembers;
  const ds = getDutySchedule();
  ds.members = newMembers;
  LS.set('dutySchedule', ds);
  save();
  closeModal();
  renderWalk();
  renderDashboard();
}

// ==================== ENHANCED STATS ====================
let statPeriod = 'day'; // 'day', 'week', 'month'
let statOffset = 0; // 0 = current, -1 = previous, etc.

function renderWalkStats() {
  // Period tabs
  const periods = [{k:'day',l:'日'},{k:'week',l:'周'},{k:'month',l:'月'}];
  document.getElementById('stat-period-tabs').innerHTML = periods.map(p =>
    `<button class="tb ${statPeriod===p.k?'active':''}" onclick="statPeriod='${p.k}';statOffset=0;renderWalkStats()">${p.l}</button>`
  ).join('');

  // Calculate date range
  const {start, end, label} = getStatRange(statPeriod, statOffset);
  const startStr = localDateStr(start);
  const endStr = localDateStr(end);

  // Nav
  document.getElementById('stat-nav').innerHTML = `
    <button class="stat-nav-btn" onclick="statOffset--;renderWalkStats()">◀</button>
    <span class="tsm" style="font-weight:600">${label}</span>
    <button class="stat-nav-btn" onclick="if(statOffset<0){statOffset++;renderWalkStats()}"${statOffset>=0?' disabled style="opacity:.3"':''}>▶</button>
  `;

  // Filter logs in range
  const rangeLogs = walkLogs.filter(w => w.date >= startStr && w.date <= endStr);

  let html = '';
  dogs.forEach(dog => {
    const dogLogs = rangeLogs.filter(w => {
      const dogNames = (w.dogName || '').split(',');
      return dogNames.includes(dog.name) || dogNames.includes('一起');
    });
    if (dogLogs.length === 0 && rangeLogs.length === 0) {
      html += `<div class="stat-card"><div class="stat-card-title">${dog.avatar} ${dog.name || '未命名'}</div><div class="tsm tmut">暂无记录</div></div>`;
      return;
    }
    // Group by walker
    const walkerMap = {};
    dogLogs.forEach(w => {
      if (!walkerMap[w.walker]) walkerMap[w.walker] = { count: 0, duration: 0 };
      walkerMap[w.walker].count++;
      walkerMap[w.walker].duration += (w.duration || 0);
    });
    const totalCount = dogLogs.length;
    const totalDuration = dogLogs.reduce((s, w) => s + (w.duration || 0), 0);

    let rows = '';
    Object.keys(walkerMap).forEach(walker => {
      const wk = walkerMap[walker];
      rows += `<div class="stat-row"><span>👤 ${walker}</span><span>${wk.count}次 / ${formatFriendlyDuration(wk.duration)}</span></div>`;
    });

    html += `<div class="stat-card">
      <div class="stat-card-title">📊 ${dog.avatar} ${dog.name || '未命名'}</div>
      ${rows}
      <div class="stat-total"><span>总计</span><span>${totalCount}次 / ${formatFriendlyDuration(totalDuration)}</span></div>
    </div>`;
  });
  document.getElementById('walk-stats-content').innerHTML = html || '<div class="tsm tmut tc">暂无统计数据</div>';
}

function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

function getStatRange(period, offset) {
  const now = new Date();
  let start, end, label;
  if (period === 'day') {
    const d = new Date(now);
    d.setDate(d.getDate() + offset);
    start = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    end = new Date(start);
    label = localDateStr(start);
  } else if (period === 'week') {
    const d = new Date(now);
    // Monday-based week
    const currentDay = d.getDay() === 0 ? 7 : d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - currentDay + 1 + offset * 7);
    start = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate());
    end = new Date(start);
    end.setDate(start.getDate() + 6);
    label = `${start.getMonth()+1}.${start.getDate()} - ${end.getMonth()+1}.${end.getDate()}`;
  } else {
    // month
    const m = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    start = new Date(m.getFullYear(), m.getMonth(), 1);
    end = new Date(m.getFullYear(), m.getMonth() + 1, 0);
    label = `${start.getFullYear()}年${start.getMonth()+1}月`;
  }
  return { start, end, label };
}

function formatFriendlyDuration(secs) {
  if (secs < 60) return secs + '秒';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + '小时' + (m > 0 ? m + '分' : '');
  return m + '分';
}

// ==================== WALK LOGS ====================
function renderWalkLogs() {
  const recent = [...walkLogs].sort((a,b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.startTime || '').localeCompare(a.startTime || '');
  }).slice(0, 20);

  if (recent.length === 0) {
    document.getElementById('walk-logs').innerHTML = `<div class="empty-s">
      <svg width="120" height="100" viewBox="0 0 120 100" style="display:block;margin:0 auto 12px">
        <ellipse cx="60" cy="85" rx="40" ry="8" fill="#F0E6DE"/>
        <circle cx="50" cy="45" r="20" fill="#FFD5CD"/>
        <circle cx="70" cy="42" r="16" fill="#FFD5CD"/>
        <circle cx="40" cy="30" r="8" fill="#FFD5CD"/>
        <circle cx="78" cy="28" r="7" fill="#FFD5CD"/>
        <circle cx="46" cy="50" r="3" fill="#2D3436"/>
        <circle cx="62" cy="48" r="3" fill="#2D3436"/>
        <ellipse cx="54" cy="54" rx="4" ry="3" fill="#FF6B6B"/>
        <path d="M38 70 Q40 80 42 85" stroke="#FFD5CD" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M72 68 Q74 78 76 85" stroke="#FFD5CD" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M80 55 Q95 50 90 60" stroke="#FFD5CD" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
      <p>还没有遛狗记录哦，快去遛狗吧！🐾</p>
    </div>`;
    return;
  }

  document.getElementById('walk-logs').innerHTML = recent.map(w => {
    const wPoops = poopLogs.filter(p => p.walkId === w.id);
    const clsMap = { '正常': 'poop-n', '偏软': 'poop-s', '异常': 'poop-a' };
    let excretionSummary = '';
    if (wPoops.length > 0) {
      // 按狗拆分
      const dogNames = [...new Set(wPoops.map(p => p.dog).filter(Boolean))];
      if (dogNames.length > 0) {
        const dogParts = dogNames.map(dogName => {
          const dogRecs = wPoops.filter(p => p.dog === dogName);
          const pee = dogRecs.filter(p => p.type === 'pee').length;
          const poopItems = dogRecs.filter(p => p.type === 'poop' || (!p.type && p.status));
          const parts = [];
          if (pee > 0) parts.push(`💧${pee}`);
          if (poopItems.length > 0) {
            const details = poopItems.map(p => `<span class="poop-t ${clsMap[p.status]||''}">${p.status}</span>`).join('');
            parts.push(`💩${poopItems.length}(${details})`);
          }
          return parts.length > 0 ? `<span style="font-weight:600">${dogName}</span>: ${parts.join(' ')}` : '';
        }).filter(Boolean);
        excretionSummary = `<div class="tsm" style="margin-top:4px">${dogParts.join(' | ')}</div>`;
      } else {
        // 兼容旧数据（没有 dog 字段）
        const peeCount = wPoops.filter(p => p.type === 'pee').length;
        const poopItems = wPoops.filter(p => p.type === 'poop' || (!p.type && p.status));
        const parts = [];
        if (peeCount > 0) parts.push(`💧小便${peeCount}次`);
        if (poopItems.length > 0) {
          const details = poopItems.map(p => p.status).join('/');
          parts.push(`💩大便${poopItems.length}次(${details})`);
        }
        excretionSummary = `<div class="tsm" style="margin-top:4px">${parts.join(' ')}</div>`;
      }
    }
    return `<div class="walk-i">
      <div class="fb"><div><span style="font-weight:600">${w.dogName}</span> <span class="badge b-sec">${w.walker}</span></div>
        <button class="del-b" onclick="deleteWalk('${w.id}')">🗑️</button></div>
      <div class="tsm tmut">${w.date} ${w.startTime || ''} - ${w.endTime || ''} · ${formatDuration(w.duration)}</div>
      ${excretionSummary}
    </div>`;
  }).join('');
}

function deleteWalk(id) {
  if (!confirm('确定要删除这条遛狗记录吗？')) return;
  walkLogs = walkLogs.filter(w => w.id !== id);
  poopLogs = poopLogs.filter(p => p.walkId !== id);
  save();
  renderWalk();
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  _appReady = true;
  fetchWeather();
  renderDashboard();
  renderFoodPage();
  // Dismiss splash screen immediately after first render
  const splash = document.getElementById('splash');
  if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 400); }
  // Init Firebase asynchronously (won't block page)
  initFirebase();
  // Register Service Worker — force update & clear stale caches
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Force the new SW to activate immediately
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (nw) nw.addEventListener('statechange', () => {
          if (nw.state === 'activated') {
            // New SW active — reload once to use cache-first strategy
            if (!sessionStorage.getItem('sw-refreshed')) {
              sessionStorage.setItem('sw-refreshed', '1');
              location.reload();
            }
          }
        });
      });
      // Check for updates on each visit
      reg.update().catch(() => {});
    }).catch(() => {});
  }
  // Refresh weather every 30 min
  setInterval(fetchWeather, 30 * 60 * 1000);
});
</script>
